<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Tracker - Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body.auth-page {
      overflow: auto;
      background:
        radial-gradient(1200px 500px at -20% -30%, rgba(14, 165, 233, 0.28), transparent 62%),
        radial-gradient(900px 500px at 120% 120%, rgba(245, 158, 11, 0.24), transparent 58%),
        linear-gradient(145deg, #f8fcff 0%, #f3f7ff 45%, #eff8ff 100%);
    }
    .auth-orb {
      position: fixed;
      border-radius: 999px;
      pointer-events: none;
      filter: blur(2px);
      z-index: 0;
      animation: floatOrb 9s ease-in-out infinite;
    }
    .orb-a {
      width: 220px;
      height: 220px;
      top: 8%;
      right: 5%;
      background: radial-gradient(circle at 30% 30%, rgba(14, 165, 233, 0.42), rgba(14, 165, 233, 0.08));
    }
    .orb-b {
      width: 180px;
      height: 180px;
      left: 8%;
      bottom: 7%;
      background: radial-gradient(circle at 60% 40%, rgba(16, 185, 129, 0.34), rgba(16, 185, 129, 0.08));
      animation-delay: 1.4s;
    }
    .auth-wrap {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 36px 20px;
    }
    .auth-card {
      width: 100%;
      max-width: 450px;
      border-radius: 24px;
      padding: 30px;
      background: rgba(255, 255, 255, 0.86);
      border: 1px solid rgba(148, 163, 184, 0.22);
      box-shadow: 0 28px 60px rgba(15, 23, 42, 0.16);
      backdrop-filter: blur(10px);
      animation: riseIn 0.5s ease both;
    }
    .auth-kicker {
      margin: 0 0 8px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #0369a1;
    }
    .auth-title {
      margin: 0;
      font-family: "Sora", "Manrope", sans-serif;
      font-size: 32px;
      line-height: 1.05;
      color: #0f172a;
    }
    .auth-subtitle {
      margin: 12px 0 20px;
      color: #4b5563;
      font-size: 14px;
    }
    .auth-tabs {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      padding: 6px;
      margin-bottom: 14px;
      background: rgba(148, 163, 184, 0.14);
      border-radius: 14px;
    }
    .auth-tabs .btn {
      justify-content: center;
      border-radius: 10px;
      box-shadow: none;
      transform: none;
    }
    .auth-tabs .btn-primary {
      background: #ffffff;
      color: #0f172a;
    }
    .auth-tabs .btn-secondary {
      background: transparent;
      color: #475569;
    }
    #authMsg {
      margin: 6px 0 12px;
      min-height: 20px;
      color: #b91c1c;
      font-size: 13px;
      font-weight: 600;
    }
    .auth-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 8px;
    }
    .btn-login,
    .btn-register {
      width: 100%;
      border: 0;
      border-radius: 14px;
      padding: 13px 16px;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0.02em;
      color: #ffffff;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
    }
    .btn-login {
      background: linear-gradient(135deg, #0284c7 0%, #0ea5e9 60%, #22d3ee 100%);
      box-shadow: 0 16px 30px rgba(2, 132, 199, 0.34);
    }
    .btn-register {
      background: linear-gradient(135deg, #059669 0%, #10b981 70%, #34d399 100%);
      box-shadow: 0 16px 30px rgba(5, 150, 105, 0.28);
      margin-top: 4px;
    }
    .btn-login:hover,
    .btn-register:hover {
      transform: translateY(-2px);
      filter: brightness(1.03);
    }
    .btn-login:disabled,
    .btn-register:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
      filter: none;
    }
    .auth-divider {
      position: relative;
      text-align: center;
      margin: 2px 0;
      font-size: 12px;
      color: #64748b;
    }
    .auth-divider::before {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 50%;
      border-top: 1px solid #dbe3ef;
      z-index: 0;
    }
    .auth-divider span {
      position: relative;
      z-index: 1;
      background: rgba(255, 255, 255, 0.9);
      padding: 0 10px;
    }
    .btn-google {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 12px 16px;
      border-radius: 14px;
      border: 1px solid rgba(148, 163, 184, 0.35);
      background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
      color: #0f172a;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.09);
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    }
    .btn-google:hover {
      transform: translateY(-2px);
      border-color: rgba(2, 132, 199, 0.5);
      box-shadow: 0 14px 24px rgba(15, 23, 42, 0.12);
    }
    .btn-google svg {
      width: 18px;
      height: 18px;
    }
    .form-group label {
      font-size: 13px;
      font-weight: 700;
      color: #1f2937;
      letter-spacing: 0.01em;
    }
    .form-group input {
      border-radius: 12px;
      border-color: #d4deeb;
      background: rgba(255, 255, 255, 0.92);
    }
    .form-group input:focus {
      border-color: #0ea5e9;
      box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.15);
    }
    .hidden { display: none; }
    @keyframes riseIn {
      from { opacity: 0; transform: translateY(16px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes floatOrb {
      0%, 100% { transform: translateY(0) translateX(0); }
      50% { transform: translateY(-12px) translateX(6px); }
    }
    @media (max-width: 560px) {
      .auth-card { padding: 24px 18px; border-radius: 20px; }
      .auth-title { font-size: 28px; }
    }
  </style>
</head>
<body class="auth-page">
  <div class="auth-orb orb-a"></div>
  <div class="auth-orb orb-b"></div>
  <div class="auth-wrap">
    <div class="card auth-card">
      <p class="auth-kicker">Personal Finance Control</p>
      <h1 class="auth-title">Expense Tracker</h1>
      <p class="auth-subtitle">MO-IT149 - Web Technology Application.</p>

      <div class="auth-tabs">
        <button class="btn btn-primary" id="tabLogin">Login</button>
        <button class="btn btn-secondary" id="tabRegister">Register</button>
      </div>

      <p id="authMsg"></p>

      <!-- LOGIN -->
      <form id="loginForm">
        <div class="form-group">
          <label>Email</label>
          <input id="loginEmail" type="email" required />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input id="loginPassword" type="password" required />
        </div>
        <div class="auth-actions">
          <button class="btn-login" type="submit">Login</button>

          <div class="auth-divider">
            <span>or continue with</span>
          </div>

          <a id="googleLoginLink" class="btn-google" href="#">
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path fill="#EA4335" d="M12 10.2v3.9h5.5c-.2 1.3-1.5 3.8-5.5 3.8-3.3 0-6-2.7-6-6s2.7-6 6-6c1.9 0 3.2.8 3.9 1.5l2.7-2.6C16.9 3.2 14.7 2.2 12 2.2A9.8 9.8 0 0 0 2.2 12 9.8 9.8 0 0 0 12 21.8c5.6 0 9.3-3.9 9.3-9.4 0-.6-.1-1.1-.2-1.5H12z"/>
            </svg>
            <span>Login with Google</span>
          </a>
        </div>
      </form>

      <!-- REGISTER -->
      <form id="registerForm" class="hidden">
        <div class="form-group">
          <label>Name</label>
          <input id="regName" type="text" required />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input id="regEmail" type="email" required />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input id="regPassword" type="password" required minlength="6" />
        </div>
        <button class="btn-register" type="submit">Create Account</button>
      </form>
    </div>
  </div>

  <script>
    const API = "http://localhost:5000"; // adjust if needed
    document.getElementById("googleLoginLink").href = `${API}/api/auth/google`;

    // Handle OAuth redirect from backend and persist token in localStorage.
    (function handleOAuthRedirect() {
      const queryParams = new URLSearchParams(window.location.search);
      const hashParams = new URLSearchParams(window.location.hash.replace(/^#/, ""));
      const token = hashParams.get("token") || queryParams.get("token");
      if (!token) return;

      localStorage.setItem("token", token);
      const name = hashParams.get("name") || queryParams.get("name");
      if (name) localStorage.setItem("userName", name);
      localStorage.removeItem("userProfileImage");

      window.history.replaceState({}, document.title, window.location.pathname);
      window.location.href = "dashboard.html";
    })();

 async function validateToken() {
    const token = localStorage.getItem("token");
    if (!token) return;

    try {
      const res = await fetch(`${API}/api/transactions/summary`, {
        headers: { Authorization: `Bearer ${token}` }
      });

      if (res.ok) {
        window.location.href = "dashboard.html";
      } else {
        // token is invalid -> force logout
        localStorage.removeItem("token");
        localStorage.removeItem("userName");
        localStorage.removeItem("userProfileImage");
      }
    } catch {
      // backend not running or network error
      localStorage.removeItem("token");
      localStorage.removeItem("userName");
      localStorage.removeItem("userProfileImage");
    }
  }

  validateToken();

    const tabLogin = document.getElementById("tabLogin");
    const tabRegister = document.getElementById("tabRegister");
    const loginForm = document.getElementById("loginForm");
    const registerForm = document.getElementById("registerForm");
    const loginSubmitBtn = loginForm.querySelector(".btn-login");
    const registerSubmitBtn = registerForm.querySelector(".btn-register");
    const authMsg = document.getElementById("authMsg");

    tabLogin.onclick = () => {
      authMsg.textContent = "";
      loginForm.classList.remove("hidden");
      registerForm.classList.add("hidden");
      tabLogin.classList.add("btn-primary");
      tabLogin.classList.remove("btn-secondary");
      tabRegister.classList.add("btn-secondary");
      tabRegister.classList.remove("btn-primary");
    };

    tabRegister.onclick = () => {
      authMsg.textContent = "";
      registerForm.classList.remove("hidden");
      loginForm.classList.add("hidden");
      tabRegister.classList.add("btn-primary");
      tabRegister.classList.remove("btn-secondary");
      tabLogin.classList.add("btn-secondary");
      tabLogin.classList.remove("btn-primary");
    };

    loginForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      authMsg.textContent = "";
      loginSubmitBtn.disabled = true;
      loginSubmitBtn.textContent = "Signing In...";

      try {
        const email = document.getElementById("loginEmail").value.trim();
        const password = document.getElementById("loginPassword").value;

        const res = await fetch(`${API}/api/auth/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();
        if (!res.ok) {
          authMsg.textContent = data.message || "Login failed";
          return;
        }

        localStorage.setItem("token", data.token);
        localStorage.setItem("userName", data.user.name);
        if (data.user.profileImage) localStorage.setItem("userProfileImage", data.user.profileImage);
        else localStorage.removeItem("userProfileImage");
        window.location.href = "dashboard.html";
      } catch {
        authMsg.textContent = "Unable to connect to server";
      } finally {
        loginSubmitBtn.disabled = false;
        loginSubmitBtn.textContent = "Login";
      }
    });

    registerForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      authMsg.textContent = "";
      registerSubmitBtn.disabled = true;
      registerSubmitBtn.textContent = "Creating Account...";

      try {
        const name = document.getElementById("regName").value.trim();
        const email = document.getElementById("regEmail").value.trim();
        const password = document.getElementById("regPassword").value;

        const res = await fetch(`${API}/api/auth/register`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, email, password })
        });

        const data = await res.json();
        if (!res.ok) {
          authMsg.textContent = data.message || "Registration failed";
          return;
        }

        // auto-login after register (optional but nice)
        localStorage.setItem("token", data.token);
        localStorage.setItem("userName", data.user.name);
        if (data.user.profileImage) localStorage.setItem("userProfileImage", data.user.profileImage);
        else localStorage.removeItem("userProfileImage");
        window.location.href = "dashboard.html";
      } catch {
        authMsg.textContent = "Unable to connect to server";
      } finally {
        registerSubmitBtn.disabled = false;
        registerSubmitBtn.textContent = "Create Account";
      }
    });
  </script>
</body>
</html>
